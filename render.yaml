services:
  # ─────────────────────────────────────────────────────────────
  # Backend — FastAPI (Python)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: econsur-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker main:app --bind 0.0.0.0:$PORT --timeout 120
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
    disk:
      name: econsur-data-disk
      mountPath: /opt/render/project/src/data
      sizeGB: 5

  # ─────────────────────────────────────────────────────────────
  # Frontend — React (Static Site)
  # ─────────────────────────────────────────────────────────────
  - type: web
    name: econsur-frontend
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    headers:
      - path: /*
        name: Cache-Control
        value: no-cache
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
    envVars:
      - key: VITE_API_URL
        value: https://econsur-api.onrender.com
