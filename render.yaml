services:
  - type: web
    name: econsur-api
    runtime: python
    rootDir: .
    # El buildCommand hace TODO:
    # 1) Instala dependencias Python
    # 2) Instala Node.js y compila el frontend React -> genera backend/static/
    # 3) Clona los 4 repos de datos publicos -> quedan en backend/data/
    buildCommand: >-
      pip install -r backend/requirements.txt &&
      curl -fsSL https://deb.nodesource.com/setup_20.x | bash - &&
      apt-get install -y nodejs &&
      cd frontend && npm install && npm run build &&
      cd .. && bash sync_data.sh
    startCommand: uvicorn backend.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
